site_name: GitHub Enterprise Delivery Zone
site_description: Operating model + reference implementation for GitHub Enterprise at scale
repo_url: https://github.com/MAMMISAID/Gh-Delivery-Zone
repo_name: MAMMISAID/Gh-Delivery-Zone
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  font: false
  palette:
    - scheme: default
      primary: white
      accent: blue
  features:
    - navigation.indexes
    - navigation.top
    - content.action.edit
    - content.action.view
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/ammisaid/

extra_css:
  - stylesheets/github-docs.css

extra_javascript:
  - javascripts/header-home-link.js

plugins:
  - search
  - drawio

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.highlight
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Get Started: getting-started.md
  - Architecture:
      - Core Mental Model: architecture/mental-model.md
      - Cockpit Organization: architecture/cockpit-org.md
      - Organization Strategy: architecture/org-strategy.md
  - Operating model:
      - Roles & RACI: operating-model/roles-raci.md
      - Exception Process: operating-model/exception-process.md
      - Observability: operating-model/observability.md
  - Guardrails:
      - Repository Baseline: guardrails/repo-baseline.md
      - Enterprise Policies: guardrails/policies.md
      - Custom Properties: guardrails/custom-properties.md
      - Rulesets: guardrails/rulesets.md
      - Required Workflows: guardrails/required-workflows.md
  - How-to:
      - Author Required Workflows: how-to/author-required-workflows.md
      - Consume Framework: how-to/consume-framework.md
      - Provision Organization: how-to/provision-organization.md
      - Onboarding a Team: how-to/onboarding-a-team.md
  - Decisions (ADRs):
      - Documentation Stack: adr/0001-docs-stack.md
      - Rulesets over Branch Protection: adr/0002-rulesets-over-branch-protection.md
      - Multi-Organization Strategy: adr/0003-multi-org-strategy.md
      - Time-Bound Exceptions: adr/0004-time-bound-exceptions.md
